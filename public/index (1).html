<!DOCTYPE html>

<title>HmaraCasino</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #080810;
  color: #fff;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 20% 30%, #7C5CFC20 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, #F0B42915 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #FF4F4F08 0%, transparent 60%);
  animation: bgPulse 8s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes bgPulse { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

.card {
  background: #10101E;
  border: 1px solid #ffffff12;
  border-radius: 24px;
  padding: 52px 44px;
  max-width: 420px; width: 90%;
  text-align: center;
  position: relative; z-index: 1;
  box-shadow: 0 30px 80px #00000060;
  animation: cardIn 0.6s ease;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.card::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
  background: linear-gradient(90deg, transparent, #7C5CFC, #F0B429, transparent);
  border-radius: 2px;
}

.logo-emoji { font-size: 64px; display: block; margin-bottom: 16px; animation: bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

h1 {
  font-size: 32px; font-weight: 800; margin-bottom: 10px;
  background: linear-gradient(135deg, #F0B429, #FF8C00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 15px; color: #7070A0; line-height: 1.6; margin-bottom: 36px; }

.discord-btn {
  background: #5865F2;
  color: white; border: none; border-radius: 14px;
  padding: 16px 28px; font-size: 16px; font-weight: 700;
  cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 8px 30px #5865F240;
}
.discord-btn:hover { background: #4752C4; transform: translateY(-2px); box-shadow: 0 12px 40px #5865F250; }

.features {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 28px;
}
.feat {
  background: #16162A; border: 1px solid #ffffff0A;
  border-radius: 12px; padding: 14px 12px;
  font-size: 13px; color: #7070A0; font-weight: 600;
  transition: all 0.2s;
}
.feat:hover { border-color: #ffffff20; color: #fff; }
.feat span { display: block; font-size: 22px; margin-bottom: 6px; }
</style>
</head>

</body>
</html>
